<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Character Dossiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Cormorant+SC:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe5;
    --paper-dark: #e8e0cf;
    --ink: #1f1d1a;
    --ink-soft: #4a463f;
    --ink-faint: #7a7468;
    --accent: #6b8caf;
    --accent-deep: #3d5a7a;
    --gold: #a88a4a;
    --gold-deep: #7e6432;
    --crimson: #8b3a3a;
    --rule: #c9bfa8;
    --rule-soft: #d8d0bd;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "EB Garamond", "Cormorant Garamond", Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    font-weight: 400;
  }
  body {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(168, 138, 74, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(107, 140, 175, 0.05) 0%, transparent 50%);
    min-height: 100vh;
    padding: 2.5rem 1rem 4rem;
  }

  .page {
    max-width: 1180px;
    margin: 0 auto;
  }

  header.masthead {
    text-align: center;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1.75rem;
    margin-bottom: 2.25rem;
    position: relative;
  }
  header.masthead::before {
    content: "";
    position: absolute;
    top: -1.25rem; left: 50%; transform: translateX(-50%);
    width: 220px; height: 3px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--accent-deep) 20%,
      var(--gold) 50%,
      var(--accent-deep) 80%,
      transparent 100%);
  }
  header.masthead::after {
    content: "";
    display: block;
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 1rem auto 0;
  }
  .eyebrow {
    font-family: "Cormorant SC", serif;
    font-size: 0.78rem;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  h1.masthead-title {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-size: 3rem;
    line-height: 1.05;
    margin: 0 0 0.4rem;
    letter-spacing: 0.02em;
  }
  .masthead-sub {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 1.05rem;
    margin: 0;
  }

  /* FILTER BAR */
  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem 1.5rem;
    max-width: 760px;
    margin: 0 auto 2.25rem;
    padding: 1.25rem 1.5rem;
    background: rgba(232, 224, 207, 0.45);
    border: 1px solid var(--rule);
    border-radius: 2px;
    position: relative;
  }
  .filters::before {
    content: "";
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%, var(--gold) 50%, transparent 100%);
  }
  .filter {
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .filter label {
    font-family: "Cormorant SC", serif;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 0.45rem;
  }
  .filter-input-wrap {
    position: relative;
  }
  .filter input {
    width: 100%;
    font-family: "EB Garamond", serif;
    font-size: 1.05rem;
    padding: 0.55rem 2.2rem 0.55rem 0.75rem;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }
  .filter input:focus {
    border-color: var(--accent-deep);
  }
  .filter .clear-btn {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--ink-faint);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0.15rem 0.4rem;
    line-height: 1;
    visibility: hidden;
    font-family: "EB Garamond", serif;
  }
  .filter .clear-btn.visible {
    visibility: visible;
  }
  .filter .clear-btn:hover { color: var(--crimson); }

  .suggestions {
    position: absolute;
    top: calc(100% + 2px);
    left: 0; right: 0;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-top: 1px solid var(--accent-deep);
    box-shadow: 0 4px 14px rgba(31, 29, 26, 0.12);
    max-height: 240px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }
  .suggestions.open { display: block; }
  .suggestion {
    padding: 0.5rem 0.8rem;
    cursor: pointer;
    font-size: 1rem;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--rule-soft);
  }
  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover,
  .suggestion.active {
    background: var(--paper-dark);
    color: var(--ink);
  }
  .suggestion .match {
    color: var(--accent-deep);
    font-weight: 500;
  }
  .suggestion.empty {
    color: var(--ink-faint);
    font-style: italic;
    cursor: default;
  }
  .suggestion.empty:hover { background: transparent; color: var(--ink-faint); }

  /* VIEW TOGGLES */
  .view-toggles {
    max-width: 760px;
    margin: 0 auto 1.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem 1.75rem;
    align-items: baseline;
  }
  .toggle-group {
    display: flex;
    align-items: baseline;
    gap: 0.35rem;
    flex-wrap: wrap;
  }
  .toggle-group-label {
    font-family: "Cormorant SC", serif;
    font-size: 0.68rem;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-right: 0.15rem;
    white-space: nowrap;
  }
  .toggle {
    font-family: "EB Garamond", serif;
    font-size: 0.92rem;
    padding: 0.22rem 0.65rem;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    letter-spacing: 0.01em;
    line-height: 1.4;
  }
  .toggle:hover { border-color: var(--accent-deep); color: var(--ink); }
  .toggle.on {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }
  .preset-select {
    font-family: "EB Garamond", serif;
    font-size: 0.92rem;
    padding: 0.22rem 0.7rem 0.22rem 0.65rem;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    line-height: 1.4;
    appearance: auto;
  }
  .preset-select:hover, .preset-select:focus {
    border-color: var(--accent-deep);
    color: var(--ink);
    outline: none;
  }
  .preset-select.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  /* CARD FOOTER */
  .card-footer {
    display: flex;
    align-items: center;
    padding: 0 1.1rem 0.65rem;
    gap: 0.5rem;
    min-height: 1.8rem;
  }
  .sys-footer-area {
    flex: 2;
    min-width: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .sys-logo-img {
    height: 18px;
    width: auto;
    max-width: 100%;
    display: block;
    mix-blend-mode: multiply;
    opacity: 0.55;
    filter: grayscale(1);
  }
  .sys-badge {
    font-family: "Cormorant SC", serif;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    opacity: 0.8;
    line-height: 1;
  }
  /* VTT DOWNLOAD */
  .vtt-area {
    position: relative;
    flex: 1;
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }
  .vtt-btn {
    font-family: "Cormorant SC", serif;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 0.18rem 0.4rem;
    border: 1px solid var(--rule);
    border-radius: 1px;
    text-decoration: none;
    display: inline-block;
    transition: color 0.12s, border-color 0.12s;
    cursor: pointer;
    background: none;
    line-height: 1.4;
    white-space: nowrap;
  }
  .vtt-btn:hover, .vtt-btn.active {
    border-color: var(--accent-deep);
    color: var(--accent-deep);
  }
  .vtt-dropdown {
    position: absolute;
    bottom: calc(100% + 5px);
    right: -1px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-top: 2px solid var(--accent-deep);
    box-shadow: 0 -4px 18px rgba(31,29,26,0.14);
    min-width: 200px;
    z-index: 200;
    display: none;
  }
  .vtt-dropdown.open { display: block; }
  .vtt-dl-item {
    display: block;
    padding: 0.42rem 0.8rem;
    font-family: "EB Garamond", serif;
    font-size: 0.9rem;
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px solid var(--rule-soft);
    white-space: nowrap;
  }
  .vtt-dl-item:last-child { border-bottom: none; }
  .vtt-dl-item:hover { background: var(--paper-dark); color: var(--ink); }

  .result-count {
    text-align: center;
    font-family: "Cormorant SC", serif;
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 1.5rem;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.75rem;
  }
  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    box-shadow: 0 1px 2px rgba(31, 29, 26, 0.05);
    cursor: pointer;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg,
      var(--accent-deep) 0%,
      var(--gold) 50%,
      var(--accent-deep) 100%);
    opacity: 0.85;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(31, 29, 26, 0.15);
    border-color: var(--gold);
  }
  .card-image {
    width: 100%;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: var(--paper-dark);
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: sepia(0.05) saturate(0.95);
  }
  .card-image.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      linear-gradient(135deg, var(--paper-dark) 0%, var(--paper) 100%);
    color: var(--ink-faint);
  }
  .card-image .monogram {
    font-family: "Cormorant Garamond", serif;
    font-weight: 400;
    font-size: 4.5rem;
    letter-spacing: 0.05em;
    color: var(--gold-deep);
    opacity: 0.55;
    line-height: 1;
  }
  .card-body {
    padding: 1rem 1.1rem 0.5rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card-eyebrow {
    font-family: "Cormorant SC", serif;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.4rem;
  }
  .card-name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-size: 1.45rem;
    line-height: 1.15;
    margin: 0 0 0.5rem;
    color: var(--ink);
  }
  .card-name .given {
    font-style: italic;
    color: var(--accent-deep);
  }
  .card-subtitle {
    font-style: italic;
    font-size: 0.95rem;
    color: var(--ink-soft);
    margin: 0 0 0.85rem;
    line-height: 1.35;
  }
  .card-meta {
    margin-top: auto;
    padding-top: 0.7rem;
    border-top: 1px solid var(--rule-soft);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .meta-row {
    display: flex;
    font-size: 0.85rem;
    line-height: 1.3;
  }
  .meta-row .meta-label {
    font-family: "Cormorant SC", serif;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    width: 72px;
    flex-shrink: 0;
    padding-top: 0.18rem;
  }
  .meta-row .meta-value {
    color: var(--ink-soft);
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 1.1rem;
    grid-column: 1 / -1;
  }

  footer.colophon {
    margin-top: 3.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-family: "Cormorant SC", serif;
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  @media (max-width: 640px) {
    body { padding: 1.5rem 0.75rem 3rem; }
    h1.masthead-title { font-size: 2.25rem; }
    .filters { grid-template-columns: 1fr; padding: 1rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 1rem; }
    .card-name { font-size: 1.2rem; }
  }
</style>
</head>
<body>
  <div class="page">

    <header class="masthead">
      <div class="eyebrow">Player Character Dossiers</div>
      <h1 class="masthead-title">The Register</h1>
      <p class="masthead-sub">A standing list of player-characters across systems and campaigns.</p>
    </header>

    <div class="filters">
      <div class="filter" data-field="system">
        <label for="filter-system">Game System</label>
        <div class="filter-input-wrap">
          <input type="text" id="filter-system" autocomplete="off" placeholder="Start typing&hellip;" spellcheck="false">
          <button type="button" class="clear-btn" aria-label="Clear system filter">&times;</button>
          <div class="suggestions" id="suggestions-system" role="listbox"></div>
        </div>
      </div>
      <div class="filter" data-field="campaign">
        <label for="filter-campaign">Campaign</label>
        <div class="filter-input-wrap">
          <input type="text" id="filter-campaign" autocomplete="off" placeholder="Start typing&hellip;" spellcheck="false">
          <button type="button" class="clear-btn" aria-label="Clear campaign filter">&times;</button>
          <div class="suggestions" id="suggestions-campaign" role="listbox"></div>
        </div>
      </div>
    </div>

    <div class="view-toggles">
      <div class="toggle-group">
        <button class="toggle on" id="featured-btn">Featured</button>
        <select id="preset-select" class="preset-select" aria-label="Preset view">
          <option value="">&#8212;</option>
          <option value="now-playing">Now Playing</option>
          <option value="bushi-oni">The Bushi Oni</option>
          <option value="collateral">Collateral</option>
          <option value="crescent-city">Historica Arcanum: Istanbul</option>
          <option value="retired">Retired</option>
        </select>
      </div>
      <div class="toggle-group">
        <span class="toggle-group-label">Status</span>
        <button class="toggle on" data-status="active">Active</button>
        <button class="toggle" data-status="hiatus">Hiatus</button>
        <button class="toggle" data-status="past">Past</button>
        <button class="toggle" data-status="one-shot">One-shot</button>
        <button class="toggle" data-status="unplayed">Unplayed</button>
      </div>
      <div class="toggle-group">
        <span class="toggle-group-label">Role</span>
        <button class="toggle on" data-role="pc">PCs</button>
        <button class="toggle" data-role="support">Support</button>
        <button class="toggle" data-role="gm-pc">GM PCs</button>
        <button class="toggle" data-role="pre-gen">Pre-gen</button>
      </div>
    </div>

    <div class="result-count" id="result-count"></div>

    <main class="grid" id="grid"></main>

    <footer class="colophon">Confidential &middot; for the table</footer>
  </div>

      subtitle: 'Chief Enforcer of the Normandy Tribunal &mdash; The Granite Inquisitor',
      system: 'Ars Magica 5e',
      campaign: 'Sj&oacute;rseiðr',
      role: 'gm-pc',
      campaignStatus: 'active'
    },
    {
      name: '<span class="given">Yanos</span> Pelagos Benthos',
      plain: 'Yanos Pelagos Benthos',
      file: 'Yanos_Pelagos_Benthos_Dossier.html',
      image: 'thumbs/yanos.jpg',
      eyebrow: 'Triton &middot; Cleric / Warlock',
      subtitle: 'Navigator by faith &mdash; He heard a voice in the shell. He never thought to ask whose.',
      system: 'D&amp;D 5e',
      campaign: 'Seas Above &amp; Below',
      role: 'pc',
      campaignStatus: 'past'
    },
    {
      name: '<span class="given">Ygva</span>',
      plain: 'Ygva',
      file: 'Ygva_Dossier.html',
      image: 'thumbs/ygva.jpg',
      eyebrow: 'Ridgeborne Giant &middot; Witch (Moon)',
      subtitle: 'Ridgeborne Shargan &mdash; Witch of the Moon &mdash; Domains: Dread &amp; Sage',
      system: 'Daggerheart',
      campaign: 'Caul',
      role: 'gm-pc',
      campaignStatus: 'hiatus'
    },
    {
      name: '<span class="given">Zehra</span> of the Spinning Veil',
      plain: 'Zehra of the Spinning Veil',
      file: 'Zehra_of_the_Spinning_Veil_Dossier.html',
      image: 'thumbs/zehra.jpg',
      eyebrow: 'Monk &middot; The Crescent City',
      subtitle: 'Dervish of the Galata Lodge &mdash; Whirling Dervish',
      system: 'D&amp;D 5e',
      campaign: 'The Crescent City',
      role: 'pre-gen',
      campaignStatus: 'unplayed'
    },
    {
      name: '<span class="given">Zuno</span>',
      plain: 'Zuno',
      file: 'Zuno_Dossier.html',
      image: 'thumbs/zuno.jpg',
      eyebrow: 'Forest Gnome &middot; Telepath &middot; House Kath',
      subtitle: 'Majordomo of House Kath &mdash; Forest Gnome Telepath-Bard &mdash; Ptolus',
      system: 'D&amp;D 5e',
      campaign: 'Ptolus: Velvet Glove, Iron Fist',
      role: 'gm-pc',
      featured: true,
      campaignStatus: 'unplayed'
    }
  ];

  // ----- Shuffle + roster -----
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const roster = shuffle(characters);

  // ----- Preset views -----
  const PRESETS = {
    'now-playing':   { statuses: ['active'],   roles: ['pc'],      campaign: '',                system: '' },
    'bushi-oni':     { statuses: ['unplayed'], roles: ['pre-gen'], campaign: 'The Bushi Oni',   system: '' },
    'collateral':    { statuses: ['active'],   roles: ['pre-gen'], campaign: 'Collateral',      system: '' },
    'crescent-city': { statuses: ['unplayed'], roles: ['pre-gen'], campaign: 'The Crescent City', system: '' },
    'retired':       { statuses: ['past'],     roles: ['pc'],      campaign: '',                system: '' },
  };

  // ----- System logo abbreviations -----
  const SYSTEM_LOGOS = {
    'Ars Magica 5e':                      'ArM5',
    'Call of Cthulhu 7e':                 'CoC',
    'Call of Cthulhu':                    'CoC',
    'Cortex Prime':                       'Ctx',
    'Cyberpunk RED':                      'CPRED',
    'D&amp;D 5e':                         'D&amp;D',
    'DIE':                                'DIE',
    'Daggerheart':                        'DH',
    'Delta Green':                        'DG',
    'Draw Steel':                         'DS',
    'FATE Core':                          'FATE',
    'Fate of the Norns: Ragnarok':        'FotN',
    'Feng Shui 1e':                       'FS',
    'Good Society':                       'GS',
    'Household':                          'HH',
    'Invisible Sun':                      'IS',
    'Legend of the Five Rings 5e':        { abbr: 'L5R', src: 'logos/l5r.png' },
    'Legends of Wulin':                   'LoW',
    'Marvel Multiverse RPG':              'MaMu',
    'Monster of the Week':                'MotW',
    'Monsterhearts':                      'MH',
    'Old School Essentials':              'OSE',
    'Pathfinder 2e':                      'PF2e',
    'Pendragon':                          'KAP',
    'Pulp Cthulhu / Cthulhu by Gaslight': 'CoC',
    'Shadowdark RPG':                     'SDK',
    'The One Ring 2e':                    'TOR2',
    'Vaesen':                             'Vsn',
    'Vampire: the Masquerade':            'VtM',
    'Werewolf: The Apocalypse':           'WtA',
  };

  // ----- VTT display labels -----
  const VTT_LABELS = {
    'foundry':     'FVTT',
    'alchemy':     'ALCM',
    'forge-steel': 'FGST',
  };

  // ----- Filter state -----
  let featuredMode   = true;
  let activeStatuses = new Set(['active']);
  let activeRoles    = new Set(['pc']);

  // ----- Render -----
  const gridEl = document.getElementById('grid');
  const countEl = document.getElementById('result-count');
  const sysInput = document.getElementById('filter-system');
  const campInput = document.getElementById('filter-campaign');
  const sysSugg = document.getElementById('suggestions-system');
  const campSugg = document.getElementById('suggestions-campaign');

  function cardHTML(c) {
    const img = c.image
      ? `<div class="card-image"><img src="${encodeURI(c.image)}" alt="Portrait of ${c.plain}" loading="lazy"></div>`
      : `<div class="card-image placeholder"><span class="monogram">${c.monogram || c.plain.charAt(0)}</span></div>`;
    // System logo/badge (bottom-left)
    const sysEntry = SYSTEM_LOGOS[c.system];
    const sysAbbr = sysEntry ? (sysEntry.abbr || sysEntry) : '';
    const sysSrc  = sysEntry && sysEntry.src ? sysEntry.src : null;
    const sysTitle = c.system.replace(/&amp;/g, '&');
    let sysHtml;
    if (sysSrc) {
      sysHtml = `<div class="sys-footer-area"><img class="sys-logo-img" src="${encodeURI(sysSrc)}" alt="${sysTitle}" title="${sysTitle}"></div>`;
    } else if (sysAbbr) {
      sysHtml = `<div class="sys-footer-area"><span class="sys-badge" title="${sysTitle}">${sysAbbr}</span></div>`;
    } else {
      sysHtml = `<div class="sys-footer-area"></div>`;
    }
    // VTT download (bottom-right)
    let vttHtml = '';
    if (c.sheets && c.sheets.length === 1) {
      const s = c.sheets[0];
      const lbl = VTT_LABELS[s.vtt] || s.vtt.toUpperCase();
      vttHtml = `<div class="vtt-area"><a class="vtt-btn" href="${encodeURI(s.file)}" download title="Download ${lbl} character sheet">${lbl}</a></div>`;
    } else if (c.sheets && c.sheets.length > 1) {
      const lbl = VTT_LABELS[c.sheets[0].vtt] || c.sheets[0].vtt.toUpperCase();
      const items = c.sheets.map(s =>
        `<a class="vtt-dl-item" href="${encodeURI(s.file)}" download>${s.label}</a>`
      ).join('');
      vttHtml = `<div class="vtt-area"><button class="vtt-btn" type="button" title="Download ${lbl} character sheet">${lbl} &#9662;</button><div class="vtt-dropdown">${items}</div></div>`;
    }
    return `
      <div class="card" data-href="${encodeURI(c.file)}" tabindex="0" role="link" aria-label="${c.plain}">
        ${img}
        <div class="card-body">
          <div class="card-eyebrow">${c.eyebrow}</div>
          <h2 class="card-name">${c.name}</h2>
          <p class="card-subtitle">${c.subtitle}</p>
          <div class="card-meta">
            <div class="meta-row"><span class="meta-label">Campaign</span><span class="meta-value">${c.campaign}</span></div>
          </div>
        </div>
        <div class="card-footer">${sysHtml}${vttHtml}</div>
      </div>`;
  }

  function exitFeatured() {
    if (featuredMode) {
      featuredMode = false;
      document.getElementById('featured-btn').classList.remove('on');
    }
  }

  function clearPreset() {
    const sel = document.getElementById('preset-select');
    if (sel && sel.value) {
      sel.value = '';
      sel.classList.remove('active');
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  function applyPreset(key) {
    const p = PRESETS[key];
    if (!p) return;
    // Update state
    activeStatuses = new Set(p.statuses);
    activeRoles    = new Set(p.roles);
    // Update status toggles
    document.querySelectorAll('.toggle[data-status]').forEach(btn => {
      btn.classList.toggle('on', activeStatuses.has(btn.dataset.status));
    });
    // Update role toggles
    document.querySelectorAll('.toggle[data-role]').forEach(btn => {
      btn.classList.toggle('on', activeRoles.has(btn.dataset.role));
    });
    // Update text inputs
    sysInput.value  = p.system;
    campInput.value = p.campaign;
    sysInput.parentElement.querySelector('.clear-btn').classList.toggle('visible', p.system.length > 0);
    campInput.parentElement.querySelector('.clear-btn').classList.toggle('visible', p.campaign.length > 0);
    // Style the select
    document.getElementById('preset-select').classList.add('active');
    render();
    history.replaceState(null, '', '#' + key);
  }

  function render() {
    let filtered;
    if (featuredMode) {
      filtered = roster.filter(c => c.featured);
    } else {
      const sysQ  = sysInput.value.trim().toLowerCase();
      const campQ = campInput.value.trim().toLowerCase();
      filtered = roster.filter(c =>
        activeStatuses.has(c.campaignStatus) &&
        activeRoles.has(c.role) &&
        (!sysQ  || c.system.toLowerCase().includes(sysQ)) &&
        (!campQ || c.campaign.toLowerCase().includes(campQ))
      );
    }
    if (filtered.length === 0) {
      gridEl.innerHTML = `<div class="empty-state">No dossiers match the current filters.</div>`;
    } else {
      gridEl.innerHTML = filtered.map(cardHTML).join('');
    }
    countEl.textContent = featuredMode
      ? `${filtered.length} featured`
      : filtered.length === roster.length
        ? `${roster.length} ${roster.length === 1 ? 'dossier' : 'dossiers'} on file`
        : `${filtered.length} of ${roster.length} shown`;
  }

  // ----- Toggle handlers -----
  document.getElementById('featured-btn').addEventListener('click', () => {
    featuredMode = true;
    document.getElementById('featured-btn').classList.add('on');
    clearPreset();
    render();
  });

  document.querySelectorAll('.toggle[data-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      exitFeatured();
      clearPreset();
      const s = btn.dataset.status;
      if (activeStatuses.has(s)) { activeStatuses.delete(s); btn.classList.remove('on'); }
      else                        { activeStatuses.add(s);    btn.classList.add('on');    }
      render();
    });
  });

  document.querySelectorAll('.toggle[data-role]').forEach(btn => {
    btn.addEventListener('click', () => {
      exitFeatured();
      clearPreset();
      const r = btn.dataset.role;
      if (activeRoles.has(r)) { activeRoles.delete(r); btn.classList.remove('on'); }
      else                     { activeRoles.add(r);    btn.classList.add('on');    }
      render();
    });
  });

  // ----- Card navigation + VTT download -----
  function closeAllVttDropdowns() {
    document.querySelectorAll('.vtt-dropdown.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.vtt-btn.active').forEach(b => b.classList.remove('active'));
  }

  document.getElementById('grid').addEventListener('click', e => {
    // VTT multi-sheet dropdown toggle
    const vttBtn = e.target.closest('.vtt-btn[type="button"]');
    if (vttBtn) {
      e.stopPropagation();
      const dropdown = vttBtn.parentElement.querySelector('.vtt-dropdown');
      const isOpen = dropdown.classList.contains('open');
      closeAllVttDropdowns();
      if (!isOpen) { dropdown.classList.add('open'); vttBtn.classList.add('active'); }
      return;
    }
    // Download link: close dropdown, allow default download
    if (e.target.closest('.vtt-dl-item')) {
      e.stopPropagation();
      closeAllVttDropdowns();
      return;
    }
    // Anything else in vtt-area: don't navigate card
    if (e.target.closest('.vtt-area')) return;
    // Card navigation
    const card = e.target.closest('.card[data-href]');
    if (card) window.location.href = card.dataset.href;
  });

  document.getElementById('grid').addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('.card[data-href]');
    if (!card) return;
    e.preventDefault();
    window.location.href = card.dataset.href;
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.vtt-area')) closeAllVttDropdowns();
  });

  // ----- Autocomplete -----
  function uniqueValues(field) {
    return [...new Set(characters.map(c => c[field]))].sort((a, b) => a.localeCompare(b));
  }

  function highlight(value, query) {
    if (!query) return value;
    const i = value.toLowerCase().indexOf(query.toLowerCase());
    if (i === -1) return value;
    return value.slice(0, i) +
      `<span class="match">${value.slice(i, i + query.length)}</span>` +
      value.slice(i + query.length);
  }

  function setupAutocomplete(input, suggEl, field) {
    const all = uniqueValues(field);
    let activeIdx = -1;
    const clearBtn = input.parentElement.querySelector('.clear-btn');

    function refreshSuggestions() {
      const q = input.value.trim().toLowerCase();
      const matches = q
        ? all.filter(v => v.toLowerCase().includes(q))
        : all;
      activeIdx = -1;
      if (matches.length === 0) {
        suggEl.innerHTML = `<div class="suggestion empty">No matches</div>`;
      } else {
        suggEl.innerHTML = matches.map((v, i) =>
          `<div class="suggestion" role="option" data-value="${v.replace(/"/g, '&quot;')}" data-idx="${i}">${highlight(v, q)}</div>`
        ).join('');
      }
    }

    function open() {
      refreshSuggestions();
      suggEl.classList.add('open');
    }
    function close() {
      suggEl.classList.remove('open');
      activeIdx = -1;
    }

    input.addEventListener('focus', open);
    input.addEventListener('input', () => {
      exitFeatured();
      clearPreset();
      clearBtn.classList.toggle('visible', input.value.length > 0);
      refreshSuggestions();
      suggEl.classList.add('open');
      render();
    });
    input.addEventListener('keydown', (e) => {
      const items = [...suggEl.querySelectorAll('.suggestion:not(.empty)')];
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (!suggEl.classList.contains('open')) open();
        if (items.length === 0) return;
        activeIdx = (activeIdx + 1) % items.length;
        updateActive(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (items.length === 0) return;
        activeIdx = activeIdx <= 0 ? items.length - 1 : activeIdx - 1;
        updateActive(items);
      } else if (e.key === 'Enter') {
        if (activeIdx >= 0 && items[activeIdx]) {
          e.preventDefault();
          selectValue(items[activeIdx].dataset.value);
        } else {
          close();
        }
      } else if (e.key === 'Escape') {
        close();
        input.blur();
      }
    });

    function updateActive(items) {
      items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
      if (items[activeIdx]) {
        items[activeIdx].scrollIntoView({ block: 'nearest' });
      }
    }

    suggEl.addEventListener('mousedown', (e) => {
      const item = e.target.closest('.suggestion');
      if (!item || item.classList.contains('empty')) return;
      e.preventDefault(); // keep focus
      selectValue(item.dataset.value);
    });

    function selectValue(v) {
      exitFeatured();
      input.value = v;
      clearBtn.classList.add('visible');
      close();
      render();
    }

    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.classList.remove('visible');
      close();
      render();
      input.focus();
    });

    document.addEventListener('click', (e) => {
      if (!input.parentElement.contains(e.target)) close();
    });
  }

  document.getElementById('preset-select').addEventListener('change', (e) => {
    const key = e.target.value;
    if (!key) { e.target.classList.remove('active'); return; }
    exitFeatured();
    applyPreset(key);
  });

  setupAutocomplete(sysInput, sysSugg, 'system');
  setupAutocomplete(campInput, campSugg, 'campaign');
  (function() {
    const key = location.hash.slice(1);
    if (key && PRESETS[key]) {
      document.getElementById('preset-select').value = key;
      exitFeatured();
      applyPreset(key);
    } else {
      render();
    }
  })();
</script>
